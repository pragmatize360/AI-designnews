<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Design News Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #f8f9fa;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .controls {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"],
    select {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
      background: white;
      color: #333;
    }

    input[type="text"]::placeholder {
      color: #999;
    }

    input[type="text"]:focus,
    select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }

    .filter-row {
      display: flex;
      gap: 8px;
    }

    select {
      flex: 1;
    }

    .btn {
      padding: 8px 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.secondary {
      background: #e0e0e0;
      color: #333;
    }

    .btn.secondary:hover {
      background: #d0d0d0;
    }

    .items-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .status {
      padding: 8px 12px;
      background: #f0f4ff;
      border-left: 3px solid #667eea;
      border-radius: 2px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #667eea;
    }

    .status.error {
      background: #ffe0e0;
      border-color: #ff4444;
      color: #ff4444;
    }

    .status.success {
      background: #e0ffe0;
      border-color: #44ff44;
      color: #44aa44;
    }

    .item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .item:hover {
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
    }

    .item-title {
      font-size: 12px;
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }

    .item-source {
      font-size: 11px;
      color: #666;
      font-weight: 500;
    }

    .item-type {
      display: inline-block;
      padding: 2px 6px;
      background: #667eea;
      color: white;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .item-type.video {
      background: #ff4444;
    }

    .item-type.paper {
      background: #4488ff;
    }

    .item-type.release {
      background: #ffaa00;
    }

    .item-action {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .item-action button {
      flex: 1;
      padding: 4px 8px;
      font-size: 11px;
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ddd;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .item-action button:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .pagination {
      padding: 8px 12px;
      text-align: center;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #e0e0e0;
    }

    .pagination button {
      padding: 4px 8px;
      margin: 0 4px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }

    .pagination button:hover {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 13px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI Design News</h1>
      <p>Fetch and insert design content into your project</p>
    </div>

    <div class="controls">
      <div class="search-row">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search (e.g., AI, design, frontend)..."
        >
        <button class="btn" onclick="handleSearch()">Search</button>
      </div>

      <div class="filter-row">
        <select id="contentType" onchange="handleFilterChange()">
          <option value="all">All Types</option>
          <option value="article">Articles</option>
          <option value="video">Videos</option>
          <option value="paper">Papers</option>
          <option value="release">Releases</option>
        </select>
        <select id="focusArea" onchange="handleFilterChange()">
          <option value="all">All Focus Areas</option>
          <option value="ai-research">AI/ML Research</option>
          <option value="design-ux">Design/UX</option>
          <option value="frontend-dev">Frontend Dev</option>
          <option value="product-industry">Product/Industry</option>
          <option value="youtube-creator">YouTube Creators</option>
          <option value="podcast-newsletter">Podcasts/News</option>
        </select>
        <button class="btn secondary" onclick="handleFilterChange()">Apply</button>
      </div>
    </div>

    <div class="items-container">
      <div id="statusArea"></div>
      <div id="itemsList"></div>
      <div id="paginationArea"></div>
    </div>
  </div>

  <script>
    let currentPage = 1;
    let currentLimit = 15;
    let allItems = [];

    // Initialize
    window.onload = () => {
      parent.postMessage({ pluginMessage: { type: 'fetch-filters' } }, '*');
      loadItems();
    };

    function loadItems() {
      const query = document.getElementById('searchInput').value;
      const contentType = document.getElementById('contentType').value;
      const focusArea = document.getElementById('focusArea').value;

      showStatus('Loading...', 'info');
      
      parent.postMessage({
        pluginMessage: {
          type: 'fetch-items',
          query: query,
          contentType: contentType,
          focusArea: focusArea,
          page: currentPage,
          limit: currentLimit
        }
      }, '*');
    }

    function handleSearch() {
      currentPage = 1;
      loadItems();
    }

    function handleFilterChange() {
      currentPage = 1;
      loadItems();
    }

    function insertItem(item) {
      parent.postMessage({
        pluginMessage: {
          type: 'insert-item',
          item: item
        }
      }, '*');
    }

    function showStatus(message, type = 'info') {
      const statusArea = document.getElementById('statusArea');
      statusArea.innerHTML = `<div class="status ${type}">${message}</div>`;
    }

    function renderItems(items) {
      const itemsList = document.getElementById('itemsList');
      
      if (!items || items.length === 0) {
        itemsList.innerHTML = '<div class="loading">No items found. Try different filters.</div>';
        return;
      }

      itemsList.innerHTML = items.map(item => `
        <div class="item">
          <div class="item-title">${item.title || 'Untitled'}</div>
          <div class="item-meta">
            <span class="item-source">${item.source?.name || 'Unknown'}</span>
            <span class="item-type ${item.type}">${item.type?.toUpperCase() || 'ARTICLE'}</span>
          </div>
          ${item.summary ? `<div class="item-summary">${item.summary.substring(0, 80)}...</div>` : ''}
          <div class="item-action">
            <button onclick='insertItem(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Insert</button>
            ${item.url ? `<button onclick="window.open('${item.url}')">Open</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    // Listen for messages from plugin
    window.onEachPluginMessage = (message) => {
      if (message.type === 'items-loaded') {
        allItems = message.data.data || [];
        const total = message.data.pagination?.total || 0;
        
        renderItems(allItems);
        showStatus(`✅ Loaded ${allItems.length} items (Total: ${total})`, 'success');
        
        // Render pagination
        const paginationArea = document.getElementById('paginationArea');
        const maxPages = Math.ceil(total / currentLimit);
        paginationArea.innerHTML = `
          <div class="pagination">
            Page ${currentPage} of ${maxPages || 1}
            ${currentPage > 1 ? `<button onclick="previousPage()">← Previous</button>` : ''}
            ${currentPage < maxPages ? `<button onclick="nextPage()">Next →</button>` : ''}
          </div>
        `;
      } else if (message.type === 'error') {
        showStatus(`❌ ${message.message}`, 'error');
      } else if (message.type === 'item-inserted') {
        showStatus(`✨ ${message.message}`, 'success');
      }
    };

    function nextPage() {
      currentPage++;
      loadItems();
    }

    function previousPage() {
      currentPage--;
      loadItems();
    }

    // Fallback for postMessage
    window.addEventListener('message', event => {
      if (event.data.pluginMessage) {
        window.onEachPluginMessage(event.data.pluginMessage);
      }
    });
  </script>
</body>
</html>
